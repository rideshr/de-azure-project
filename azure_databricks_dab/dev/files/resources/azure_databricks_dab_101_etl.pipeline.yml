# The main pipeline for azure_databricks_dab_101

resources:
  pipelines:
    azure_databricks_dab_101_etl:
      name: azure_databricks_dab_101_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/azure_databricks_dab_101_etl"

      libraries:
        - glob:
            include: ../src/azure_databricks_dab_101_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
