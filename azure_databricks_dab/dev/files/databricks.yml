# This is a Databricks asset bundle definition for azure_databricks_dab_101.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: azure_databricks_dab_101
  uuid: 4f4cb1f0-99bc-43e3-ac17-003cd69f08d1

include:
  - resources/*.yml
  - resources/*/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405607262568456.16.azuredatabricks.net
    variables:
      catalog: main
      schema: ${workspace.current_user.short_name}
  prod:
    mode: production
    workspace:
      host: https://adb-7405607262568456.16.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/ridesh30062001_gmail.com#ext#@ridesh30062001gmail.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/ridesh30062001_gmail.com#ext#@ridesh30062001gmail.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: main
      schema: prod
    permissions:
      - user_name: ridesh30062001_gmail.com#ext#@ridesh30062001gmail.onmicrosoft.com
        level: CAN_MANAGE
